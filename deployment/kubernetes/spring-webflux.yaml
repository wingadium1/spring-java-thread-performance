apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-webflux
  labels:
    app: spring-webflux
spec:
  replicas: 4
  selector:
    matchLabels:
      app: spring-webflux
  template:
    metadata:
      labels:
        app: spring-webflux
    spec:
      containers:
      - name: spring-webflux
        image: spring-performance/spring-webflux:latest
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: JAVA_TOOL_OPTIONS
          # Reactor Netty I/O worker threads default to availableProcessors() × 2,
          # capped by the CPU limit (2 CPUs → 4 event-loop threads by default).
          # WebFlux typically needs less heap than MVC because it avoids large
          # per-thread stacks and Tomcat NIO buffers, but we keep the same budget
          # for a fair memory comparison.  Lower initial allocation (-25 %) means
          # the JVM yields unused RSS to the kernel faster after GC.
          value: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=25.0 -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: spring-webflux
spec:
  type: ClusterIP
  selector:
    app: spring-webflux
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
