apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-mvc-traditional
  labels:
    app: spring-mvc-traditional
spec:
  replicas: 4
  selector:
    matchLabels:
      app: spring-mvc-traditional
  template:
    metadata:
      labels:
        app: spring-mvc-traditional
    spec:
      containers:
      - name: spring-mvc-traditional
        image: spring-performance/spring-mvc-traditional:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: JAVA_TOOL_OPTIONS
          # UseContainerSupport ensures JVM reads CPU/memory limits from cgroup.
          # Heap set to 75 % of the 2 Gi container limit; 25 % left for off-heap,
          # Metaspace, native Tomcat threads, and NIO buffers.
          # Tomcat thread-pool capped at 200 (default); tune SERVER_TOMCAT_THREADS_MAX
          # to experiment with thread exhaustion vs. concurrency behaviour.
          value: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=25.0 -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
        - name: SERVER_TOMCAT_THREADS_MAX
          value: "200"
        - name: SERVER_TOMCAT_THREADS_MIN_SPARE
          value: "10"
        resources:
          requests:
            # 1 CPU guaranteed per pod → scheduler ensures the pod has CPU headroom.
            # Burstable to 2 CPUs under low-competition to allow realistic peak throughput.
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: spring-mvc-traditional
spec:
  type: ClusterIP
  selector:
    app: spring-mvc-traditional
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
