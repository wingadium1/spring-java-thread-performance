apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-virtual-threads
  labels:
    app: spring-virtual-threads
spec:
  replicas: 4
  selector:
    matchLabels:
      app: spring-virtual-threads
  template:
    metadata:
      labels:
        app: spring-virtual-threads
    spec:
      containers:
      - name: spring-virtual-threads
        image: spring-performance/spring-virtual-threads:latest
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: JAVA_TOOL_OPTIONS
          # Virtual threads are mapped M:N onto a fork-join carrier pool whose
          # parallelism defaults to Runtime.availableProcessors() → respects the
          # cgroup CPU limit (2 CPUs here).  Same heap budget as MVC for a fair
          # memory comparison; off-heap pressure is much lower because VTs are
          # stack-less until scheduled.
          value: "-XX:+UseContainerSupport -XX:InitialRAMPercentage=25.0 -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: spring-virtual-threads
spec:
  type: ClusterIP
  selector:
    app: spring-virtual-threads
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
