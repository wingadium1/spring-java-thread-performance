apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spring-mvc-traditional-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spring-mvc-traditional
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
