name: Deploy to Proxmox LXC Containers

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-proxmox-lxc:
    name: Deploy to Proxmox LXC Containers
    runs-on: self-hosted
    env:
      PROXMOX_DEPLOY_METHOD: ${{ vars.PROXMOX_DEPLOY_METHOD || secrets.PROXMOX_DEPLOY_METHOD }}
    permissions:
      contents: read
      actions: read
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop')) || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout code
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        uses: actions/checkout@v6
      
      - name: Set up JDK 21
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        run: mvn clean package -DskipTests
      
      - name: Create or update LXC containers on Proxmox
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        env:
          PROXMOX_API_HOST: ${{ vars.PROXMOX_API_HOST || secrets.PROXMOX_API_HOST }}
          PROXMOX_API_TOKEN_ID: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          PROXMOX_API_SECRET: ${{ secrets.PROXMOX_API_SECRET }}
          PROXMOX_NODE: ${{ vars.PROXMOX_NODE || secrets.PROXMOX_NODE }}
        run: |
          set -euo pipefail

          # Install curl and jq if not available
          command -v jq >/dev/null 2>&1 || sudo apt-get install -y jq
          
          # Proxmox API base URL
          API_URL="https://${PROXMOX_API_HOST}:8006/api2/json"
          AUTH_HEADER="PVEAPIToken=${PROXMOX_API_TOKEN_ID}=${PROXMOX_API_SECRET}"
          
          # Function to call Proxmox API
          CALL_HTTP_CODE=""

          call_proxmox_api_raw() {
            local method=$1
            local endpoint=$2
            local data=${3:-}

            local resp body code
            if [ -n "$data" ]; then
              resp=$(curl -k -sS -X "$method" \
                -H "Authorization: $AUTH_HEADER" \
                -d "$data" \
                -w $'\n%{http_code}' \
                "${API_URL}${endpoint}")
            else
              resp=$(curl -k -sS -X "$method" \
                -H "Authorization: $AUTH_HEADER" \
                -w $'\n%{http_code}' \
                "${API_URL}${endpoint}")
            fi

            body=${resp%$'\n'*}
            code=${resp##*$'\n'}
            CALL_HTTP_CODE="$code"
            printf '%s' "$body"
          }

          call_proxmox_api() {
            local method=$1
            local endpoint=$2
            local data=${3:-}

            local body
            body=$(call_proxmox_api_raw "$method" "$endpoint" "$data")

            if [ -z "${CALL_HTTP_CODE:-}" ]; then
              echo "Proxmox API call failed to return HTTP status code" >&2
              return 1
            fi

            if [ "$CALL_HTTP_CODE" -ge 400 ]; then
              echo "Proxmox API error ${CALL_HTTP_CODE} for ${method} ${endpoint}" >&2
              echo "$body" | head -c 2000 >&2 || true
              return 1
            fi

            printf '%s' "$body"
          }

          echo "Proxmox API URL: ${API_URL}"

          # Sanity check: ensure API is reachable and token is valid
          NODES_JSON=$(call_proxmox_api GET "/nodes")
          if ! echo "$NODES_JSON" | jq -e '.data and (.data | length > 0)' >/dev/null; then
            echo "Failed to list Proxmox nodes via API. Check:"
            echo "- PROXMOX_API_HOST should be host/IP only (e.g. 10.16.90.103), not https://... or :8006 or /api2/json"
            echo "- PROXMOX_API_TOKEN_ID / PROXMOX_API_SECRET are correct"
            echo "- Proxmox API is reachable from the runner"
            echo "Raw response (truncated):"
            echo "$NODES_JSON" | head -c 1000 || true
            exit 1
          fi

          wait_for_container() {
            local ctid=$1
            local attempts=${2:-30}
            local i
            for i in $(seq 1 "$attempts"); do
              local status_json status
              status_json=$(call_proxmox_api_raw GET "/nodes/${PROXMOX_NODE}/lxc/${ctid}/status/current")
              if [ "${CALL_HTTP_CODE}" != "200" ]; then
                status="notfound"
              else
                status=$(echo "$status_json" | jq -r '.data.status // "notfound"')
              fi
              if [ "$status" != "notfound" ]; then
                echo "Container ${ctid} is present with status: ${status}"
                return 0
              fi
              sleep 2
            done
            return 1
          }

          urlencode_upid() {
            # UPID contains ':' which must be URL-encoded in the API path
            # Proxmox UPIDs typically only need ':' encoding here.
            printf '%s' "$1" | sed 's/:/%3A/g'
          }

          wait_for_task() {
            local upid_raw=$1
            local upid
            local attempts=${2:-60}
            local i
            upid=$(urlencode_upid "$upid_raw")
            for i in $(seq 1 "$attempts"); do
              local task_json
              task_json=$(call_proxmox_api GET "/nodes/${PROXMOX_NODE}/tasks/${upid}/status")
              local status exitstatus
              status=$(echo "$task_json" | jq -r '.data.status // empty')
              exitstatus=$(echo "$task_json" | jq -r '.data.exitstatus // empty')

              if [ "$status" = "stopped" ]; then
                if [ -n "$exitstatus" ] && [ "$exitstatus" != "OK" ]; then
                  echo "Task ${upid_raw} failed with exitstatus: ${exitstatus}"
                  echo "Task log (last 200 lines):"
                  call_proxmox_api GET "/nodes/${PROXMOX_NODE}/tasks/${upid}/log?start=0&limit=200" \
                    | jq -r '.data[]?.t' || true
                  return 1
                fi
                echo "Task ${upid_raw} finished: ${exitstatus:-OK}"
                return 0
              fi

              sleep 2
            done

            echo "Task ${upid_raw} did not stop in time"
            return 1
          }
          
          # Create or start containers
          for APP in "spring-mvc-traditional" "spring-virtual-threads" "spring-webflux"; do
            echo "Processing $APP..."
            
            # Get container ID (assume 200, 201, 202 for the three apps)
            case $APP in
              "spring-mvc-traditional") CTID=200; PORT=8080 ;;
              "spring-virtual-threads") CTID=201; PORT=8081 ;;
              "spring-webflux") CTID=202; PORT=8082 ;;
            esac
            
            # Check if container exists
            STATUS_JSON=$(call_proxmox_api_raw GET "/nodes/${PROXMOX_NODE}/lxc/${CTID}/status/current")
            if [ "${CALL_HTTP_CODE}" != "200" ]; then
              STATUS="notfound"
            else
              STATUS=$(echo "$STATUS_JSON" | jq -r '.data.status // "notfound"')
            fi
            
            if [ "$STATUS" = "notfound" ]; then
              echo "Creating new LXC container ${CTID} for ${APP}..."
              
              # Create LXC container (Ubuntu 24.04 template)
              CREATE_RESP=$(call_proxmox_api POST "/nodes/${PROXMOX_NODE}/lxc" \
                "vmid=${CTID}&ostemplate=local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst&hostname=${APP}&memory=2048&cores=2&rootfs=local-lvm:8&net0=name=eth0,bridge=vmbr0,ip=dhcp&start=1&unprivileged=1"
              )

              UPID=$(echo "$CREATE_RESP" | jq -r '.data // empty')
              if [ -z "$UPID" ]; then
                echo "Container create API call did not return a task UPID. Response:"
                echo "$CREATE_RESP" | jq -C . || echo "$CREATE_RESP"
                exit 1
              fi

              echo "Create task: $UPID"
              wait_for_task "$UPID" 90
              echo "Waiting for container ${CTID} to appear..."
              if ! wait_for_container "${CTID}" 45; then
                echo "Container ${CTID} still not found after create. Common causes: missing LXC template, wrong PROXMOX_NODE, insufficient permissions, or storage/net config issues."
                exit 1
              fi
            else
              echo "Container ${CTID} already exists with status: $STATUS"
              
              # Start container if stopped
              if [ "$STATUS" = "stopped" ]; then
                echo "Starting container ${CTID}..."
                START_RESP=$(call_proxmox_api POST "/nodes/${PROXMOX_NODE}/lxc/${CTID}/status/start")
                START_UPID=$(echo "$START_RESP" | jq -r '.data // empty')
                if [ -z "$START_UPID" ]; then
                  echo "Container start API call did not return a task UPID. Response:"
                  echo "$START_RESP" | jq -C . || echo "$START_RESP"
                  exit 1
                fi
                echo "Start task: $START_UPID"
                wait_for_task "$START_UPID" 60
                sleep 5
              fi
            fi
          done

          echo ""
          echo "=== Proxmox API Diagnostics ==="
          echo "API host: ${PROXMOX_API_HOST}"
          echo "Target node (PROXMOX_NODE): ${PROXMOX_NODE}"

          echo "Nodes:"
          echo "$NODES_JSON" | jq -r '.data[]?.node'

          echo ""
          echo "LXC list per node (vmid, name, status):"
          for NODE in $(echo "$NODES_JSON" | jq -r '.data[]?.node'); do
            echo "- ${NODE}:"
            call_proxmox_api GET "/nodes/${NODE}/lxc" \
              | jq -r '.data[]? | "  \(.vmid)\t\(.name // .hostname // "-")\t\(.status // "-")"' \
              || echo "  (failed to list lxc on ${NODE})"
          done

          echo ""
          echo "Locate CTIDs 200/201/202 across nodes:"
          for CTID in 200 201 202; do
            FOUND=""
            for NODE in $(echo "$NODES_JSON" | jq -r '.data[]?.node'); do
              STATUS_JSON=$(call_proxmox_api_raw GET "/nodes/${NODE}/lxc/${CTID}/status/current")
              if [ "${CALL_HTTP_CODE}" != "200" ]; then
                STATUS="notfound"
              else
                STATUS=$(echo "$STATUS_JSON" | jq -r '.data.status // "notfound"')
              fi
              if [ "$STATUS" != "notfound" ]; then
                FOUND="${NODE} (${STATUS})"
                break
              fi
            done
            if [ -n "$FOUND" ]; then
              echo "CT ${CTID}: ${FOUND}"
            else
              echo "CT ${CTID}: not found on any node"
            fi
          done
      
      - name: Install Java and deploy applications to LXC containers
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        env:
          PROXMOX_API_HOST: ${{ vars.PROXMOX_API_HOST || secrets.PROXMOX_API_HOST }}
          # Optional: set this to the actual Proxmox node SSH endpoint that hosts the containers.
          # If omitted, defaults to PROXMOX_API_HOST.
          PROXMOX_SSH_HOST: ${{ vars.PROXMOX_SSH_HOST || secrets.PROXMOX_SSH_HOST }}
          PROXMOX_API_TOKEN_ID: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          PROXMOX_API_SECRET: ${{ secrets.PROXMOX_API_SECRET }}
          PROXMOX_NODE: ${{ vars.PROXMOX_NODE || secrets.PROXMOX_NODE }}
          # Prefer base64-encoded key to avoid newline/CRLF corruption in secrets
          PROXMOX_SSH_KEY_B64: ${{ secrets.PROXMOX_SSH_KEY_B64 }}
          # Backward-compatible: raw private key (multiline) secret
          PROXMOX_SSH_KEY: ${{ secrets.PROXMOX_SSH_KEY }}
        run: |
          # Set up SSH key for container access
          mkdir -p ~/.ssh
          if [ -n "${PROXMOX_SSH_KEY_B64:-}" ]; then
            # Base64 is safest for GitHub Secrets
            printf '%s' "$PROXMOX_SSH_KEY_B64" | tr -d ' \n\r\t' | base64 -d > ~/.ssh/proxmox_lxc_key
          else
            # Support both true-multiline secrets and single-line strings with "\n" escapes
            printf '%b' "$PROXMOX_SSH_KEY" > ~/.ssh/proxmox_lxc_key
          fi

          # Normalize CRLF (common cause of: error in libcrypto)
          tr -d '\r' < ~/.ssh/proxmox_lxc_key > ~/.ssh/proxmox_lxc_key.tmp
          mv ~/.ssh/proxmox_lxc_key.tmp ~/.ssh/proxmox_lxc_key

          chmod 600 ~/.ssh/proxmox_lxc_key

          # Safe diagnostics (does not print key body)
          echo "SSH key header: $(head -n 1 ~/.ssh/proxmox_lxc_key || true)"
          echo "SSH key bytes: $(wc -c < ~/.ssh/proxmox_lxc_key || true)"

          # Fail fast if the key cannot be parsed
          ssh-keygen -y -f ~/.ssh/proxmox_lxc_key > /dev/null

          # Avoid interactive host key prompts on CI runners
          SSH_OPTS="-i ~/.ssh/proxmox_lxc_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null"

          # SSH target host (must be the node where the CT configs live)
          if [ -z "${PROXMOX_SSH_HOST:-}" ]; then
            PROXMOX_SSH_HOST="$PROXMOX_API_HOST"
          fi
          
          # Deploy to each container
          for APP in "spring-mvc-traditional" "spring-virtual-threads" "spring-webflux"; do
            case $APP in
              "spring-mvc-traditional") CTID=200; PORT=8080 ;;
              "spring-virtual-threads") CTID=201; PORT=8081 ;;
              "spring-webflux") CTID=202; PORT=8082 ;;
            esac
            
            echo "Deploying $APP to container ${CTID}..."

            echo "Debug: PROXMOX_NODE=${PROXMOX_NODE}, PROXMOX_API_HOST=${PROXMOX_API_HOST}, PROXMOX_SSH_HOST=${PROXMOX_SSH_HOST}"
            echo "Debug: SSH host identity and available CTs:"
              ssh ${SSH_OPTS} root@${PROXMOX_SSH_HOST} "export PATH=/usr/sbin:/usr/bin:/sbin:/bin:\$PATH; hostname; echo 'PATH='\"\$PATH\"; echo 'pct='\"\$(command -v pct || true)\"; echo 'nodes:'; ls -1 /etc/pve/nodes 2>/dev/null || true; echo 'pct list (first 20):'; pct list 2>/dev/null | head -n 20 || true"

            # Guard: fail early with a clear message if the container does not exist on this Proxmox host
            if ! ssh ${SSH_OPTS} root@${PROXMOX_SSH_HOST} "export PATH=/usr/sbin:/usr/bin:/sbin:/bin:\$PATH; pct status ${CTID} >/dev/null 2>&1"; then
              echo "Container ${CTID} not found on SSH host '${PROXMOX_SSH_HOST}' (or pct not available in PATH). Ensure container creation succeeded, and that SSH lands on the Proxmox node '${PROXMOX_NODE}' where the CT lives."
              exit 1
            fi

            # Install Java in container if not present, and ensure app dir exists
            ssh ${SSH_OPTS} root@${PROXMOX_SSH_HOST} \
              "export PATH=/usr/sbin:/usr/bin:/sbin:/bin:\$PATH; pct exec ${CTID} -- bash -lc 'command -v java >/dev/null 2>&1 || (apt-get update && apt-get install -y openjdk-21-jdk)' && \
               pct exec ${CTID} -- mkdir -p /opt/spring-performance"

            # Copy JAR to Proxmox host first, then to container
            scp ${SSH_OPTS} ${APP}/target/*.jar root@${PROXMOX_SSH_HOST}:/tmp/${APP}.jar
            ssh ${SSH_OPTS} root@${PROXMOX_SSH_HOST} \
              "export PATH=/usr/sbin:/usr/bin:/sbin:/bin:\$PATH; pct push ${CTID} /tmp/${APP}.jar /opt/spring-performance/${APP}.jar"
            
            # Create systemd service file locally
            printf '[Unit]\nDescription=%s\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/spring-performance\nExecStart=/usr/bin/java -Xms512m -Xmx2g -jar /opt/spring-performance/%s.jar\nRestart=on-failure\nRestartSec=10\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n' "${APP}" "${APP}" > /tmp/${APP}.service
            
            # Copy service file to Proxmox and deploy to container
            scp ${SSH_OPTS} /tmp/${APP}.service root@${PROXMOX_SSH_HOST}:/tmp/${APP}.service
            ssh ${SSH_OPTS} root@${PROXMOX_SSH_HOST} \
              "export PATH=/usr/sbin:/usr/bin:/sbin:/bin:\$PATH; pct push ${CTID} /tmp/${APP}.service /etc/systemd/system/${APP}.service && \
               pct exec ${CTID} -- systemctl daemon-reload && \
               pct exec ${CTID} -- systemctl enable ${APP} && \
               pct exec ${CTID} -- systemctl restart ${APP} && \
               rm /tmp/${APP}.service"
            
            rm /tmp/${APP}.service
          done
      
      - name: Verify deployment
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        env:
          PROXMOX_API_HOST: ${{ vars.PROXMOX_API_HOST || secrets.PROXMOX_API_HOST }}
          PROXMOX_SSH_HOST: ${{ vars.PROXMOX_SSH_HOST || secrets.PROXMOX_SSH_HOST }}
          PROXMOX_SSH_KEY: ${{ secrets.PROXMOX_SSH_KEY }}
        run: |
          echo "Waiting for applications to start..."
          sleep 30
          
          echo "Checking application health..."
          if [ -z "${PROXMOX_SSH_HOST:-}" ]; then
            PROXMOX_SSH_HOST="$PROXMOX_API_HOST"
          fi
          ssh -i ~/.ssh/proxmox_lxc_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o GlobalKnownHostsFile=/dev/null root@${PROXMOX_SSH_HOST} << 'ENDSSH'
            export PATH=/usr/sbin:/usr/bin:/sbin:/bin:$PATH
            for CTID in 200 201 202; do
              case $CTID in
                200) APP="spring-mvc-traditional"; PORT=8080 ;;
                201) APP="spring-virtual-threads"; PORT=8081 ;;
                202) APP="spring-webflux"; PORT=8082 ;;
              esac
              
              echo "Checking $APP in container ${CTID}..."
              pct exec ${CTID} -- curl -f -s http://localhost:${PORT}/actuator/health > /dev/null \
                && echo "✓ $APP is healthy" \
                || echo "✗ $APP health check failed"
              
              # Verify Prometheus metrics endpoint
              pct exec ${CTID} -- curl -f -s http://localhost:${PORT}/actuator/prometheus > /dev/null \
                && echo "✓ $APP metrics endpoint is accessible" \
                || echo "✗ $APP metrics endpoint failed"
            done
          ENDSSH
      
      - name: Display container IPs for monitoring setup
        if: ${{ env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        env:
          PROXMOX_API_HOST: ${{ vars.PROXMOX_API_HOST || secrets.PROXMOX_API_HOST }}
          PROXMOX_API_TOKEN_ID: ${{ secrets.PROXMOX_API_TOKEN_ID }}
          PROXMOX_API_SECRET: ${{ secrets.PROXMOX_API_SECRET }}
          PROXMOX_NODE: ${{ vars.PROXMOX_NODE || secrets.PROXMOX_NODE }}
        run: |
          echo ""
          echo "=== Container IPs for Monitoring ==="
          
          # Function to call Proxmox API
          call_proxmox_api() {
            local method=$1
            local endpoint=$2
            curl -k -s -X "$method" \
              -H "Authorization: PVEAPIToken=${PROXMOX_API_TOKEN_ID}=${PROXMOX_API_SECRET}" \
              "https://${PROXMOX_API_HOST}:8006/api2/json${endpoint}"
          }
          
          # Get and display container IPs
          for CTID in 200 201 202; do
            case $CTID in
              200) APP="spring-mvc-traditional"; PORT=8080 ;;
              201) APP="spring-virtual-threads"; PORT=8081 ;;
              202) APP="spring-webflux"; PORT=8082 ;;
            esac
            
            IP=$(call_proxmox_api GET "/nodes/${PROXMOX_NODE}/lxc/${CTID}/interfaces" | jq -r '.data[] | select(.name=="eth0") | .inet' | cut -d'/' -f1)
            echo "$APP (CT $CTID): $IP:$PORT"
            echo "  Metrics: http://$IP:$PORT/actuator/prometheus"
          done
          
          echo ""
          echo "Configure these IPs in your Prometheus configuration on the monitoring host."
          echo "Then run the 'Deploy Monitoring Stack' workflow."
      
      - name: Cleanup
        if: ${{ always() && env.PROXMOX_DEPLOY_METHOD == 'proxmox-lxc' }}
        run: |
          rm -f ~/.ssh/proxmox_lxc_key
