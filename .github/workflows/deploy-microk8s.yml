name: Deploy to microk8s

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-microk8s:
    name: Deploy to microk8s on Proxmox VM
    runs-on: self-hosted
    env:
      DEPLOY_METHOD: ${{ vars.DEPLOY_METHOD || secrets.DEPLOY_METHOD }}
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/spring-java-thread-performance
      MICROK8S_HOST: ${{ vars.MICROK8S_HOST || secrets.MICROK8S_HOST }}
      MICROK8S_USER: ${{ vars.MICROK8S_USER || secrets.MICROK8S_USER }}
      MICROK8S_SSH_KEY_B64: ${{ secrets.MICROK8S_SSH_KEY_B64 }}
      MICROK8S_SSH_KEY: ${{ secrets.MICROK8S_SSH_KEY }}
    permissions:
      contents: read
      actions: read
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop')) || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout code
        if: ${{ env.DEPLOY_METHOD == 'micro-k8s' }}
        uses: actions/checkout@v4
      
      - name: Resolve deployment image tag
        if: ${{ env.DEPLOY_METHOD == 'micro-k8s' }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH" == "main" ]]; then
            IMAGE_TAG="latest"
          else
            IMAGE_TAG="develop"
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      
      - name: Set up SSH to microk8s VM
        if: ${{ env.DEPLOY_METHOD == 'micro-k8s' }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          if [ -n "${MICROK8S_SSH_KEY_B64:-}" ]; then
            echo "$MICROK8S_SSH_KEY_B64" | base64 -d > ~/.ssh/microk8s_key
          else
            echo "$MICROK8S_SSH_KEY" > ~/.ssh/microk8s_key
          fi

          # Normalize CRLF (common when secrets are pasted from Windows)
          perl -pi -e 's/\r\n?/\n/g' ~/.ssh/microk8s_key
          chmod 600 ~/.ssh/microk8s_key

          # Validate key can be parsed
          ssh-keygen -y -f ~/.ssh/microk8s_key >/dev/null

          ssh-keyscan -T 5 -H "$MICROK8S_HOST" >> ~/.ssh/known_hosts
      
      - name: Deploy to microk8s
        if: ${{ env.DEPLOY_METHOD == 'micro-k8s' }}
        run: |
          set -euo pipefail

          SSH_OPTS=(
            -i ~/.ssh/microk8s_key
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )

          # Create temp directory on microk8s VM
          ssh "${SSH_OPTS[@]}" "$MICROK8S_USER@$MICROK8S_HOST" \
            "mkdir -p /tmp/k8s-deploy"
          
          # Copy fresh Kubernetes manifests
          scp "${SSH_OPTS[@]}" deployment/kubernetes/*.yaml \
            "$MICROK8S_USER@$MICROK8S_HOST:/tmp/k8s-deploy/"
          
          ssh "${SSH_OPTS[@]}" "$MICROK8S_USER@$MICROK8S_HOST" \
            "IMAGE_PREFIX='$IMAGE_PREFIX' IMAGE_TAG='$IMAGE_TAG' bash -se" << 'ENDSSH'
            # Prepare deployment directory
            rm -rf ~/spring-performance-k8s
            mkdir -p ~/spring-performance-k8s
            cp /tmp/k8s-deploy/*.yaml ~/spring-performance-k8s/
            cd ~/spring-performance-k8s
            
            # Update image references to use GHCR images
            sed -i "s|image: spring-performance/|image: ${IMAGE_PREFIX}/|g" spring-*.yaml
            sed -i "s|:latest|:${IMAGE_TAG}|g" spring-*.yaml

            # Ensure imagePullPolicy is Always for rolling tags
            sed -i '/imagePullPolicy:/d' spring-*.yaml
            sed -i '/^[[:space:]]*image: /a\        imagePullPolicy: Always' spring-*.yaml
            
            # Apply Kubernetes manifests
            microk8s kubectl apply -f spring-mvc-traditional.yaml
            microk8s kubectl apply -f spring-virtual-threads.yaml
            microk8s kubectl apply -f spring-webflux.yaml
            
            # Apply ingress (requires microk8s addons: ingress, metallb)
            microk8s kubectl apply -f ingress.yaml

            # Apply HPA for all deployments (requires metrics-server addon)
            microk8s kubectl apply -f hpa.yaml
            
            echo "Waiting for deployments to be ready..."
            microk8s kubectl wait --for=condition=available --timeout=300s deployment/spring-mvc-traditional
            microk8s kubectl wait --for=condition=available --timeout=300s deployment/spring-virtual-threads
            microk8s kubectl wait --for=condition=available --timeout=300s deployment/spring-webflux
            
            # Cleanup temp files
            rm -rf /tmp/k8s-deploy
          ENDSSH
      
      - name: Verify deployment
        if: ${{ env.DEPLOY_METHOD == 'micro-k8s' }}
        run: |
          set -euo pipefail

          SSH_OPTS=(
            -i ~/.ssh/microk8s_key
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )

          ssh "${SSH_OPTS[@]}" "$MICROK8S_USER@$MICROK8S_HOST" << 'ENDSSH'
            echo "=== Deployments ==="
            microk8s kubectl get deployments
            
            echo ""
            echo "=== Pods ==="
            microk8s kubectl get pods
            
            echo ""
            echo "=== Services ==="
            microk8s kubectl get services

            echo ""
            echo "=== Endpoints ==="
            microk8s kubectl get endpoints

            echo ""
            echo "=== Ingress ==="
            microk8s kubectl get ingress

            echo ""
            echo "=== HPA ==="
            microk8s kubectl get hpa
          ENDSSH
      
      - name: Display access information
        if: ${{ env.DEPLOY_METHOD == 'micro-k8s' }}
        run: |
          set -euo pipefail

          SSH_OPTS=(
            -i ~/.ssh/microk8s_key
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ServerAliveInterval=10
            -o ServerAliveCountMax=3
          )

          ssh "${SSH_OPTS[@]}" "$MICROK8S_USER@$MICROK8S_HOST" << 'ENDSSH'
            echo ""
            echo "=== Access Information ==="
            echo ""

            # Prefer the ingress LoadBalancer IP assigned by metallb
            INGRESS_IP=$(microk8s kubectl get ingress spring-performance-ingress \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

            if [ -n "$INGRESS_IP" ]; then
              echo "Ingress LoadBalancer IP (metallb): $INGRESS_IP"
              echo ""
              echo "Service endpoints via Ingress:"
              echo "  Spring MVC Traditional : http://${INGRESS_IP}/mvc/api/hello"
              echo "  Spring Virtual Threads : http://${INGRESS_IP}/virtual/api/hello"
              echo "  Spring WebFlux         : http://${INGRESS_IP}/webflux/api/hello"
            else
              echo "Ingress IP not yet assigned. Check: microk8s kubectl get ingress"
              echo "Ensure addons are enabled:  microk8s enable ingress metallb"
              echo ""
              echo "Fallback - port-forwarding:"
              echo "  microk8s kubectl port-forward service/spring-mvc-traditional 8080:8080"
              echo "  microk8s kubectl port-forward service/spring-virtual-threads 8081:8081"
              echo "  microk8s kubectl port-forward service/spring-webflux 8082:8082"
            fi
          ENDSSH
      
      - name: Cleanup
        if: ${{ always() && env.DEPLOY_METHOD == 'micro-k8s' }}
        run: |
          rm -f ~/.ssh/microk8s_key
